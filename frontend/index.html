<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ProductHub</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="sidebar-brand">
      <div class="brand-mark">P</div>
      <div class="brand-copy">
        <strong>ProductHub</strong>
        <small>Marketplace</small>
      </div>
    </div>

    <nav class="sidebar-nav">
      <a href="#" class="nav-item active">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="7" height="7" x="3" y="3" rx="1"/><rect width="7" height="7" x="14" y="3" rx="1"/><rect width="7" height="7" x="14" y="14" rx="1"/><rect width="7" height="7" x="3" y="14" rx="1"/></svg>
        Browse Products
      </a>
    </nav>
  </aside>

  <!-- Main -->
  <main class="main-content">

    <!-- Page heading -->
    <div class="page-heading">
      <p class="eyebrow">Marketplace</p>
      <h1>Browse Products</h1>
    </div>

    <!-- Search & Sort -->
    <div class="toolbar">
      <input type="search" id="searchInput" placeholder="Search products..." />
      <select id="sortSelect">
        <option value="newest">Newest</option>
        <option value="price-asc">Price: Low to High</option>
        <option value="price-desc">Price: High to Low</option>
      </select>
      <button id="openAddBtn" class="add-btn">+ Add Product</button>
    </div>

    <!-- Category filters -->
    <div class="filter-row" id="filterRow">
      <button class="filter-pill active" data-cat="All">All</button>
      <button class="filter-pill" data-cat="Electronics">Electronics</button>
      <button class="filter-pill" data-cat="Clothing">Clothing</button>
      <button class="filter-pill" data-cat="Shoes">Shoes</button>
      <button class="filter-pill" data-cat="Books">Books</button>
      <button class="filter-pill" data-cat="Furniture">Furniture</button>
    </div>

    <!-- Product grid -->
    <div class="product-grid" id="productGrid"></div>

  </main>

  <!-- Toast -->
  <div id="toast"></div>

  <!-- Add/Edit Modal -->
  <div id="modal" class="modal-backdrop hidden">
    <div class="modal-panel">
      <div class="modal-header">
        <div>
          <p class="eyebrow">Catalog</p>
          <h2 id="modalTitle">Add new product</h2>
        </div>
        <button class="modal-close" id="modalClose">×</button>
      </div>
      <form id="productForm" class="product-form">
        <input type="hidden" id="productId" />
        <label>
          Name
          <input type="text" id="fname" placeholder="Product name" required />
        </label>
        <label>
          Price
          <input type="number" id="fprice" placeholder="0.00" min="0" step="0.01" required />
        </label>
        <label>
          Category
          <input type="text" id="fcategory" placeholder="e.g. Electronics" required />
        </label>
        <label>
          Description
          <textarea id="fdescription" placeholder="Product description..." rows="3"></textarea>
        </label>
        <label>
          Image
          <input type="file" id="fimage" accept="image/jpeg,image/jpg,image/png,image/webp" />
        </label>
        <img id="imagePreview" class="hidden" alt="Preview" />
        <div id="formError" class="form-error hidden"></div>
        <div class="form-actions">
          <button type="button" id="cancelFormBtn" class="ghost-button">Cancel</button>
          <button type="submit" class="solid-button">Save Product</button>
        </div>
      </form>
    </div>
  </div>

  <!-- Delete Confirm Modal -->
  <div id="confirmModal" class="modal-backdrop hidden">
    <div class="modal-panel" style="max-width:460px">
      <div class="modal-header">
        <div>
          <p class="eyebrow">Confirm</p>
          <h2>Delete Product</h2>
        </div>
        <button class="modal-close" id="confirmClose">×</button>
      </div>
      <p id="confirmText" style="color:#6f665d;line-height:1.6;margin-bottom:24px"></p>
      <div class="form-actions">
        <button id="cancelDeleteBtn" class="ghost-button">Cancel</button>
        <button id="confirmDeleteBtn" class="danger-button">Delete</button>
      </div>
    </div>
  </div>

  <script src="js/script.js"></script>
</body>
</html>
